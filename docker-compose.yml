services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "cloud-course-2026", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile.backend
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: cloud-course-2026
    ports:
      - "5000:5000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  redis-data:
