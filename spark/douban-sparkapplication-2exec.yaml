apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: douban-analysis-2exec
  namespace: default
spec:
  type: Python
  mode: cluster
  image: swr.cn-east-3.myhuaweicloud.com/cloud-swjtu/pyspark:v2
  imagePullPolicy: Always
  imagePullSecrets:
    - swr-secret
  mainApplicationFile: local:///opt/spark/work-dir/douban_spark_analysis.py
  sparkVersion: 3.5.0
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "100m"
    memory: 1g
    memoryOverhead: 128m
    serviceAccount: spark
  executor:
    cores: 1
    coreRequest: "100m"
    instances: 2
    memory: 1g
    memoryOverhead: 128m
